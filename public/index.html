<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Foro</title>
<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #6b46ff, #3cc6ff, #8338ec, #3a86ff);
  background-size: 400% 400%;
  animation: bgAnim 10s ease infinite;
  color: #fff;
}

@keyframes bgAnim {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  width: 95%;
  max-width: 420px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 18px;
}

#nombreInput {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  margin-bottom: 10px;
}
.hidden { display: none; }

#messages {
  width: 100%;
  height: 300px;
  overflow-y: auto;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(10px);
  padding: 10px;
  margin-bottom: 12px;
}
.message {
  padding: 8px;
  background: rgba(255,255,255,0.75);
  margin-bottom: 6px;
  border-radius: 10px;
  color: #000;
}

#textInput {
  width: calc(100% - 65px);
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  width: 55px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: #ffffff;
  color: #333;
}
button:hover { transform: scale(1.08); }

/* Panel de velocidades */
#speedBox {
  position: fixed;
  bottom: 12px;
  right: 12px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  padding: 8px 12px;
  border-radius: 15px;
  font-size: 13px;
  color: #fff;
  font-weight: bold;
  text-shadow: 0 0 6px #000;
}
</style>
</head>
<body>

<!-- Indicadores -->
<div id="speedBox">
  вђЖпЄП 0.0 MB/s | вђЗпЄП 0.0 MB/s
</div>

<div class="container">
  <input type="text" id="nombreInput" placeholder="Tu nombre...">
  <div id="messages"></div>
  <input type="text" id="textInput" placeholder="Escribe..." maxlength="200">
  <button onclick="sendMessage()">вЮ§</button>
</div>

<script>
// Nombre persistente
const nombreInput = document.getElementById('nombreInput');
if(localStorage.getItem('nombre')){
  nombreInput.value = localStorage.getItem('nombre');
  nombreInput.classList.add('hidden');
}
nombreInput.addEventListener("change", () => {
  localStorage.setItem('nombre', nombreInput.value);
  nombreInput.classList.add('hidden');
});

// Cargar mensajes
function loadMessages(){
  fetch("load.php")
  .then(r=>r.json())
  .then(data=>{
    const div = document.getElementById("messages");
    div.innerHTML = "";
    data.forEach(m=>{
      const el=document.createElement("div");
      el.className="message";
      el.textContent=m;
      div.appendChild(el);
    });
    div.scrollTop = div.scrollHeight;
  });
}
setInterval(loadMessages,2000);
loadMessages();

// Indicador de velocidad
function loadSpeed(){
  fetch("submit-d.php?status=1")
  .then(r=>r.json())
  .then(v=>{
    document.getElementById("speedBox").innerHTML =
      `вђЖпЄП ${v.up} MB/s | вђЗпЄП ${v.down} MB/s`;
  })
  .catch(()=>{
    document.getElementById("speedBox").innerHTML =
      `вђЖпЄП 0.0 MB/s | вђЗпЄП 0.0 MB/s`;
  });
}
setInterval(loadSpeed,1500);
loadSpeed();

// Enviar mensaje
function sendMessage(){
  const txt = document.getElementById("textInput");
  const msg = txt.value.trim();
  const nombre = localStorage.getItem("nombre");

  if(!nombre) return alert("Pon tu nombre primero!");
  if(msg==="") return;

  fetch("send.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"nombre="+encodeURIComponent(nombre)+
         "&mensaje="+encodeURIComponent(msg)
  })
  .then(()=>{
    txt.value="";
    loadMessages();
    loadSpeed();
  });
}
</script>

</body>
</html>
