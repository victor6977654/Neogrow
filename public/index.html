<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foro Render</title>
<style>
    body {
        font-family: Arial, sans-serif;
        height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;

        /* Fondo animado */
        background: linear-gradient(-45deg, #5a00d3, #006eff, #7a00ff, #00b3ff);
        background-size: 400% 400%;
        animation: gradient 12s ease infinite;
    }
    @keyframes gradient {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    header {
        background: #ffffff55;
        backdrop-filter: blur(10px);
        padding: 8px;
        text-align: right;
        font-size: 14px;
        color: #000;
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        color: white;
        font-size: 15px;
    }

    #form-area {
        display: flex;
        padding: 10px;
        background: #ffffff77;
        backdrop-filter: blur(10px);
        border-top: 1px solid #ffffff77;
    }

    input, textarea, button {
        border-radius: 6px;
        border: none;
        padding: 6px;
        font-size: 14px;
    }

    #nameBox { width: 120px; margin-right: 8px; }
    #messageBox { flex: 1; resize: none; margin-right: 8px; }
    #sendBtn { background: #007fff; color: white; font-weight: bold; }

</style>
</head>

<body>

<header>
    <span id="speed">⬆️ 0.0MB/s ⬇️ 0.0MB/s</span>
</header>

<div id="chat"></div>

<div id="form-area">
    <input id="nameBox" type="text" placeholder="Tu nombre">
    <textarea id="messageBox" placeholder="Escribe un mensaje..."></textarea>
    <button id="sendBtn">Enviar</button>
</div>

<script>
// ====================== NOMBRE PERSISTENTE ======================
function loadName() {
    const saved = localStorage.getItem("username");
    if (saved) {
        document.getElementById("nameBox").style.display = "none";
    }
}
function saveName(name) {
    localStorage.setItem("username", name);
    document.getElementById("nameBox").style.display = "none";
}

// ====================== ENVÍO DE MENSAJE ======================
document.getElementById("sendBtn").addEventListener("click", () => {
    let name = localStorage.getItem("username");
    const nameBox = document.getElementById("nameBox");
    const msgBox = document.getElementById("messageBox");

    if (!name) {
        if (!nameBox.value.trim()) return;
        saveName(nameBox.value.trim());
        name = nameBox.value.trim();
    }

    const msg = msgBox.value.trim();
    if (!msg) return;

    fetch("/send-message", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, text: msg })
    })
    .then(r => r.json())
    .then(data => updateSpeed(data.upload_mb_s, data.download_mb_s));

    msgBox.value = "";
});

// ====================== VELOCIDAD AUTOMÁTICA (sin enviar) ======================
function updateSpeed(up, down) {
    document.getElementById("speed").innerText = `⬆️ ${up} ⬇️ ${down}`;
}

function checkServerSpeed() {
    fetch("https://pelermore.unaux.com/proyecto-nodejs/list-lotes.php")
        .then(r => r.json())
        .then(data => {
            if (data.download_mb_s) {
                updateSpeed("0.0MB/s", data.download_mb_s);
            }
        })
        .catch(()=>{});
}

// Consulta cada 5s
setInterval(checkServerSpeed, 5000);

// Init
loadName();
checkServerSpeed();

</script>

</body>
</html>
