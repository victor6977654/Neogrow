<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<tittle>Creator</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}
textarea, input {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
}
textarea {
    height: 220px;
}
button {
    padding: 10px 15px;
    margin-top: 10px;
}
iframe {
    width: 100%;
    height: 300px;
    border: 1px solid #aaa;
    margin-top: 10px;
}
</style>

</head>
<body>

<h2>Web Creator</h2>

<input id="nombre" placeholder="Nombre del proyecto">
<textarea id="descripcion" placeholder="Descripción (opcional)"></textarea>

<textarea id="codigo">
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Document</title>
</head>
<body>
  //Aqui pon el contenido de tu web
</body>
</html>
</textarea>

<button onclick="vista()">Vista previa</button>
<button onclick="guardar()">Guardar</button>

<iframe id="vistaPrev"></iframe>

<script>
function vista() {
    let code = document.getElementById("codigo").value;
    let iframe = document.getElementById("vistaPrev").contentWindow.document;
    iframe.open();
    iframe.write(code);
    iframe.close();
}

async function guardar() {
    const nombre = document.getElementById("nombre").value;
    const descripcion = document.getElementById("descripcion").value;
    const html = document.getElementById("codigo").value;

    if (!nombre.trim()) {
        alert("El nombre es obligatorio");
        return;
    }

    const res = await fetch("/api/proyectos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, descripcion, html })
    });

    const data = await res.json();

    if (data.ok) {
        alert("Guardado correctamente");
        window.location = "index.html";
    } else {
        alert("Error: " + data.error);
    }
}
</script>

</body>
</html>
