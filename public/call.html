<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Llamada</title>
<style>
body{margin:0;padding:0;font-family:Arial;background:#f0f5f0;}
.call-container{position:relative;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#e0f0e0;}
.user-img{width:150px;height:150px;border-radius:50%;margin:10px;object-fit:cover;box-shadow:0 4px 10px rgba(0,0,0,0.2);}
.controls{margin-top:20px;display:flex;gap:10px;}
button{padding:10px 20px;border:none;border-radius:10px;background:#4CAF50;color:white;font-weight:bold;cursor:pointer;}
button:hover{background:#45a049;}
#min-btn{position:fixed;bottom:10px;right:10px;padding:8px 15px;border-radius:50%;background:#ff5722;}
#notification{position:fixed;top:10px;right:10px;background:#ffeb3b;color:black;padding:10px;border-radius:5px;display:none;z-index:1000;}
</style>
</head>
<body>
<div class="call-container">
    <img id="userFoto" class="user-img" src="" alt="Usuario">
    <div id="userName"></div>
    <div class="controls">
        <button id="mic-btn">Mic</button>
        <button id="speaker-btn">Altavoz</button>
        <button id="hang-btn">Colgar</button>
    </div>
</div>
<button id="min-btn">^</button>
<div id="notification"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// Leer datos desde PHP via query params
const params = new URLSearchParams(window.location.search);
const to = params.get('to');
const from = params.get('from');
const nombre = params.get('nombre');
const foto = params.get('foto');

document.getElementById('userFoto').src = foto;
document.getElementById('userName').innerText = nombre;

// Registrar usuario en Node.js
socket.emit('register', { telefono: from });

// Notificación de llamada entrante
socket.on('incoming-call', data => {
    showNotification(`Llamada entrante de ${data.from}`);
});

// Mostrar notificación
function showNotification(msg){
    const n = document.getElementById('notification');
    n.innerText = msg;
    n.style.display='block';
    setTimeout(()=>{ n.style.display='none'; },5000);
}

// Botones de control
let micOn = true;
let speakerOn = true;

document.getElementById('mic-btn').addEventListener('click', ()=>{
    micOn = !micOn;
    document.getElementById('mic-btn').innerText = micOn?'Mic':'Mic (Off)';
});

document.getElementById('speaker-btn').addEventListener('click', ()=>{
    speakerOn = !speakerOn;
    document.getElementById('speaker-btn').innerText = speakerOn?'Altavoz':'Altavoz (Off)';
});

document.getElementById('hang-btn').addEventListener('click', ()=>{
    socket.emit('hang-up', { from, to });
    showNotification('Llamada finalizada');
    setTimeout(()=>{ window.close(); },1000);
});

// Minimizar llamada
document.getElementById('min-btn').addEventListener('click', ()=>{
    document.querySelector('.call-container').style.display='none';
    showNotification('Llamada minimizada (puedes continuar chateando)');
});
</script>
</body>
</html>
