<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Neogrow Launcher</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#005eff,#00ffb0);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:Arial,sans-serif;
  color:white;
}
.panel{
  background:rgba(255,255,255,0.15);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  text-align:center;
}
h1{margin-bottom:30px;}
button{
  display:block;
  margin:15px auto;
  padding:15px 35px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#00c6ff,#00ff99);
  transition:.3s;
}
button:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(0,0,0,.4);
}
footer{
  position:absolute;
  bottom:20px;
  font-size:12px;
  opacity:.85;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="panel">
  <h1>Neogrow</h1>

  <button onclick="location.href='eagle-lasted.html'">
    Iniciar Eaglecraft (Server node)
  </button>

  <button onclick="location.href='https://eaglercraft.com'">
    Iniciar Eaglecraft (Official Webpage)
  </button>

  <button onclick="cacheOffline()">
    Eaglecraft Offline (Cache, LocalStorage)
  </button>
</div>

<footer onclick="info()">No Copyright © Neogrow</footer>

<script>
async function cacheOffline(){
  if(!('caches' in window)){
    alert('Cache no soportado');
    return;
  }

  const cache = await caches.open('neogrow-offline');
  await cache.add('/download/eagle-offline.html');

  alert(
    'Eaglecraft Offline guardado.\n' +
    'Configuraciones usarán LocalStorage.'
  );
}

function info(){
  alert(
    'Neogrow es un launcher.\n' +
    'No utiliza contenido propio.\n' +
    'Sitio oficial:\nhttps://eaglercraft.com'
  );
}
</script>

</body>
</html>
