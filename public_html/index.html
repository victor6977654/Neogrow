<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Neogrow Launcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a3cff, #00c98b);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .panel {
    font-size: 2.5em;
    font-weight: bold;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }

  .container {
    background: rgba(0,0,0,0.25);
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    width: 90%;
    max-width: 420px;
    text-align: center;
  }

  button {
    width: 100%;
    padding: 15px;
    margin: 12px 0;
    border: none;
    border-radius: 14px;
    font-size: 1.05em;
    font-weight: bold;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #00e5ff, #00ff9d);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }

  button:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 25px rgba(0,0,0,0.45);
  }

  button:active {
    transform: scale(0.97);
  }

  footer {
    margin-top: 30px;
    font-size: 0.85em;
    opacity: 0.8;
    cursor: pointer;
  }

  footer:hover {
    opacity: 1;
    text-decoration: underline;
  }
</style>
</head>

<body>

  <div class="panel">Neogrow</div>

  <div class="container">
    <button onclick="location.href='/eagle-lasted.html'">
      Iniciar Eaglecraft (Server node)
    </button>

    <button onclick="location.href='https://eaglercraft.com'">
      Iniciar Eaglecraft (Official Webpage)
    </button>

    <button onclick="location.href='/download/eagle-offline.html'">
      Eagleforge mods for Eaglecraft
    </button>
  </div>

  <footer onclick="showInfo()">
    No Copyright © Neogrow
  </footer>

<script>
  function showInfo() {
    alert(
      "Neogrow funciona como launcher.\n\n" +
      "Este proyecto usa versiones que no son propias y no reclama derechos de autor.\n" +
      "El sitio oficial del proyecto original es:\n" +
      "https://eaglercraft.com"
    );
  }
</script>

</body>
</html>
