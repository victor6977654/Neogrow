<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Foro Lotes</title>
<style>
body { background:#111; color:#fff; font-family:sans-serif; }
#speedbox {
  position: fixed; top: 10px; right: 10px;
  background: #000a; color: #0f0;
  padding: 10px; border-radius: 6px;
  font-family: monospace;
}
input { width:70%; padding:10px; }
button { padding:10px; background:#0f0; color:#000; }
</style>
</head>
<body>

<h2>Foro</h2>

<div id="speedbox">⬆️ 0.00MB/s ⬇️ 0.00MB/s</div>

<input id="msg" placeholder="mensaje...">
<button onclick="send()">Enviar</button>

<ul id="chat"></ul>

<script>
const ws = new WebSocket(`wss://${location.host}`);

ws.onmessage = e => {
  const data = JSON.parse(e.data);
  if (data.type === "message") {
    const li = document.createElement("li");
    li.textContent = data.msg.text;
    document.getElementById("chat").appendChild(li);
  }
  if (data.type === "speed") {
    document.getElementById("speedbox").innerHTML =
      `⬆️ ${data.up}MB/s ⬇️ ${data.down}MB/s`;
  }
};

async function send() {
  const t = document.getElementById("msg").value;
  if (!t.trim()) return;
  await fetch("/message", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: t })
  });
  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
